# ✅ PORTA DINÂMICA DA NUVEM
server.port=${PORT:8085}

# ✅ DADOS DO BANCO MYSQL NO RAILWAY
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ CONFIGS JPA (IGUAL ANTES)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ✅ PASTA DE ARQUIVOS NA NUVEM
livraria.upload.dir=/tmp/uploads/