# ✅ PORTA OBRIGATÓRIA PARA O RAILWAY
server.port=${PORT:8085}

# ✅ DADOS DO BANCO MYSQL NO RAILWAY (VARIÁVEIS DE AMBIENTE)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ CONFIGURAÇÕES JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ✅ UPLOADS (PASTA TEMPORÁRIA NA NUVEM)
livraria.upload.dir=/tmp/uploads/