# PORTA CORRETA QUE ESTAMOS USANDO
server.port=8085

# CONEXÃO COM MYSQL (verifique senha)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3308/livraria_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:123456789}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURAÇÕES JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# 🆕 LINHA QUE ESTAVA FALTANDO (CAUSA DO ERRO)
livraria.upload.dir=uploads/