spring.application.name=backend

# ✅ Endereço INTERNO do Railway (SÓ FUNCIONA AQUI)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true

# ✅ Variáveis que o Railway CRIA SOZINHO
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ❌ ESSA LINHA ESTÁ APAGADA (não usa mais)
# spring.jpa.properties.hibernate.dialect=...

# ✅ Porta padrão do Railway
server.port=${PORT:8080}

# Conexão estável
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000