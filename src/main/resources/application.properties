spring.application.name=backend

# ✅ URL CORRETA: formato oficial + parâmetros obrigatórios
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# ✅ Usuário e senha vindos das variáveis do Render
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# ✅ Driver correto
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ Configurações JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ❌ REMOVIDA: causa aviso e não precisa mais
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ✅ Porta obrigatória do Render
server.port=${PORT:10000}