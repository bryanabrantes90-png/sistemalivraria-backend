# Nome da aplicação
spring.application.name=backend

# Configuração de conexão com o MySQL (Railway)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Porta que o Railway vai usar (essencial)
server.port=${PORT:8080}

# Configuração extra de conexão (evita erros de tempo limite)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000