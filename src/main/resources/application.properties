# ✅ PORTA OBRIGATÓRIA
server.port=${PORT:8085}

# ✅ CONEXÃO COM MYSQL (ENDEREÇO INTERNO DO RAILWAY)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&requireSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ CONFIGS JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ✅ PASTA DE UPLOAD DE ARQUIVOS
livraria.upload.dir=/tmp/uploads/